{{ define "main" }}
<main>
    <div class="container">
        <h1>{{ .Title }}</h1>
        <div class="tags">
            {{ range .Params.tags }}
            <a href="/tags/{{ . | urlize }}">#{{ . }}</a>
            {{ end }}
        </div>
        <small class="post-date">Posted on {{ .Date.Format "2 January 2006" }}</small>
        {{ .Content }}
    </div>
  <!-- Next and previous posts -->
    <nav class="post-nav">
    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}">← {{ .Title }}</a>
    {{ end }}
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}">{{ .Title }} →</a>
    {{ end }}
    </nav> 
</main>
{{ end }}
